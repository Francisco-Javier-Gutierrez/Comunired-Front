<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sin conexión</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            font-family: 'Outfit', 'Inter', sans-serif;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spinOffline 1s linear infinite;
            margin-bottom: 24px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .description {
            font-size: 16px;
            color: #a0aec0;
            /* gray.400 equivalent */
            animation: pulseOfflineText 2.5s ease-in-out infinite;
            max-width: 320px;
            line-height: 1.6;
        }

        @keyframes spinOffline {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulseOfflineText {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .retry-btn {
            margin-top: 30px;
            padding: 12px 24px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        .retry-btn:active {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <h1 class="title">Sin conexión</h1>
        <p class="description">
            Verifica tu conexión a Wi-Fi o datos móviles. La aplicación se reanudará automáticamente cuando vuelvas a
            estar en línea.
        </p>
        <button class="retry-btn" onclick="intentarReconexion()">Reintentar conexión</button>
    </div>

    <script>
        const URL_DESTINO = "https://comuni-red.com";

        function intentarReconexion() {
            setTimeout(() => {
                const url = new URL(URL_DESTINO);
                url.searchParams.set('t', new Date().getTime());
                window.location.replace(url.toString());
            }, 1000);
        }

        if (navigator.onLine) {
            intentarReconexion();
        }

        window.addEventListener('online', intentarReconexion);
    </script>
</body>

</html>
